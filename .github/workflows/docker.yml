name: Construir y subir imagen Spring Boot

on:
  push:
    branches:
      - master

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Crear JAR Spring Boot
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir imagen
        run: docker build -t veritoz/api-libreria:latest .

      - name: Subir imagen
        run: docker push veritoz/api-libreria:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 184.73.135.241
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            sudo docker pull veritoz/api-libreria:latest

            sudo docker stop api-spring || true
            sudo docker rm api-spring || true

            sudo docker run -d \
              --name api-spring \
              --network libreria-aws \
              -p 8080:8080 \
              -e AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }} \
              -e AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }} \
              veritoz/api-libreria:latest
